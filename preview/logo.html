<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;font-family:var(--font-body);color:var(--fg);}
  .wrap{
    display:grid;
    grid-template-columns:1fr 1fr;
    height:220px;
    border:1px solid var(--hairline);
  }
  .side{
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:28px 32px;
  }
  .side + .side{border-left:1px solid var(--hairline);}
  .light{background:#F7F5F2;}
  .dark{background:#1A1918;}
  .light img{max-width:78%; max-height:72%; width:auto; height:auto; display:block;}
  .dark  img{max-width:78%; max-height:72%; width:auto; height:auto; display:block; filter:invert(1);}
  .tag{
    position:absolute;
    top:10px;
    left:12px;
    font-family:var(--font-display);
    font-weight:700;
    font-size:10px;
    letter-spacing:.18em;
    text-transform:uppercase;
  }
  .light .tag{color:#6B6B6B;}
  .dark  .tag{color:#A3A3A3;}
</style></head><body>
<div class="wrap">
  <div class="side light">
    <span class="tag">On Light</span>
    <img src="../assets/logo-primary.png" alt="Business Builders logo on light">
  </div>
  <div class="side dark">
    <span class="tag">On Dark</span>
    <img src="../assets/logo-primary.png" alt="Business Builders logo on dark">
  </div>
</div>
</body></html>
