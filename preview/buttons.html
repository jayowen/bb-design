<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#F7F5F2;font-family:var(--font-body);}
  .card{padding:30px 28px; display:flex; gap:18px; align-items:center; flex-wrap:wrap;}
  .btn{font-family:var(--font-display); font-weight:700; font-size:14px; letter-spacing:0.04em; text-transform:uppercase; padding:16px 24px; border:2px solid #1A1918; cursor:pointer; display:inline-flex; align-items:center; gap:10px; background:#FACC15; color:#1A1918; border-radius:2px; transition:all .15s;}
  .btn.dark{background:#1A1918; color:#fff; border-color:#FACC15;}
  .btn.outline{background:transparent; color:#1A1918; border-color:#1A1918;}
  .btn.primary{box-shadow:4px 4px 0 0 #1A1918;}
  .btn.primary:hover{transform:translate(2px,2px); box-shadow:2px 2px 0 0 #1A1918;}
  .arrow{font-size:16px; display:inline-block;}
</style></head><body>
<div class="card">
  <button class="btn primary">Request a Quote <span class="arrow">→</span></button>
  <button class="btn dark">Free Marketing Audit</button>
  <button class="btn outline">View All Services <span class="arrow">→</span></button>
</div>
</body></html>
