<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#F7F5F2;font-family:var(--font-body);}
  .card{padding:26px; display:flex; gap:12px; flex-wrap:wrap; align-items:center;}
  .badge{font-family:var(--font-display); font-weight:700; font-size:11px; letter-spacing:0.14em; text-transform:uppercase; padding:6px 12px; background:#FACC15; color:#1A1918; border-radius:2px;}
  .pill{font-family:var(--font-display); font-weight:700; font-size:11px; letter-spacing:0.14em; text-transform:uppercase; padding:8px 14px; background:#1A1918; color:#fff; border-radius:2px; display:inline-flex; gap:6px; align-items:center;}
  .pill.dot::before{content:""; width:6px; height:6px; border-radius:999px; background:#FACC15;}
  .chip{font-family:var(--font-display); font-weight:700; font-size:11px; letter-spacing:0.14em; text-transform:uppercase; padding:6px 12px; background:#fff; color:#1A1918; border:1.5px solid #1A1918; border-radius:2px;}
  .stars{color:#FACC15; font-size:13px; letter-spacing:2px;}
</style></head><body>
<div class="card">
  <span class="badge">Web</span>
  <span class="badge">Case Study</span>
  <span class="badge">Marketing</span>
  <span class="badge">Video</span>
  <span class="pill dot">Success Stories</span>
  <span class="pill">StoryBrand Certified Agency</span>
  <span class="chip">Real Estate</span>
  <span class="stars">★★★★★</span>
</div>
</body></html>
