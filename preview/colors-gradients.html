<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#fff;}
  .card{padding:24px; display:flex; gap:14px; flex-wrap:wrap;}
  .g{width:220px; height:120px; border-radius:6px; padding:14px; display:flex; flex-direction:column; justify-content:space-between;
    font-family:var(--font-display); font-weight:700; font-size:12px; letter-spacing:0.12em; text-transform:uppercase;}
  .g .stops{font-family:var(--font-mono); font-size:11px; letter-spacing:0; text-transform:none; font-weight:500; opacity:.9;}
</style></head><body>
<div class="card">
  <div class="g" style="background:linear-gradient(135deg,#FACC15 0%,#F49E1C 100%);color:#1A1918">
    <span>Yellow Gradient</span><span class="stops">#FACC15 → #F49E1C</span>
  </div>
  <div class="g" style="background:linear-gradient(135deg,#1A1918 0%,#505050 100%);color:#FACC15">
    <span>Dark Gradient</span><span class="stops">#1A1918 → #505050</span>
  </div>
</div>
</body></html>
