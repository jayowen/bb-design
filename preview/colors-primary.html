<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#fff;font-family:var(--font-body);color:var(--fg);}
  .card{padding:24px; display:flex; flex-direction:column; gap:16px;}
  .row{display:flex; gap:10px; flex-wrap:wrap;}
  .sw{
    width:150px; height:92px; border-radius:4px; border:1px solid rgba(0,0,0,0.08);
    padding:10px; display:flex; flex-direction:column; justify-content:space-between;
    font-family:var(--font-display); font-weight:700; font-size:11px; letter-spacing:0.08em; text-transform:uppercase;
  }
  .sw .hex{font-family:var(--font-mono); font-size:11px; letter-spacing:0; text-transform:none; font-weight:500; opacity:.85;}
</style>
</head><body>
<div class="card">
  <div class="row">
    <div class="sw" style="background:#FACC15;color:#1A1918"><span>Yellow</span><span class="hex">#FACC15</span></div>
    <div class="sw" style="background:#F49E1C;color:#1A1918"><span>Yellow Deep</span><span class="hex">#F49E1C</span></div>
    <div class="sw" style="background:#1A1918;color:#FACC15"><span>Black</span><span class="hex">#1A1918</span></div>
    <div class="sw" style="background:#FFFFFF;color:#1A1918;border-color:#1A1918"><span>White</span><span class="hex">#FFFFFF</span></div>
  </div>
</div>
</body></html>
