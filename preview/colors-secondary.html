<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#fff;font-family:var(--font-body);}
  .card{padding:24px; display:flex; flex-direction:column; gap:16px;}
  .row{display:flex; gap:10px; flex-wrap:wrap;}
  .sw{
    width:150px; height:92px; border-radius:4px; border:1px solid rgba(0,0,0,0.08);
    padding:10px; display:flex; flex-direction:column; justify-content:space-between;
    font-family:var(--font-display); font-weight:700; font-size:11px; letter-spacing:0.08em; text-transform:uppercase;
  }
  .sw .hex{font-family:var(--font-mono); font-size:11px; letter-spacing:0; text-transform:none; font-weight:500; opacity:.85;}
</style>
</head><body>
<div class="card">
  <div class="row">
    <div class="sw" style="background:#111827;color:#FACC15"><span>Navy</span><span class="hex">#111827</span></div>
    <div class="sw" style="background:#505050;color:#fff"><span>Gray</span><span class="hex">#505050</span></div>
    <div class="sw" style="background:#6B6B6B;color:#fff"><span>Gray 2</span><span class="hex">#6B6B6B</span></div>
    <div class="sw" style="background:#A3A3A3;color:#1A1918"><span>Gray 3</span><span class="hex">#A3A3A3</span></div>
    <div class="sw" style="background:#E5E5E5;color:#1A1918"><span>Hairline</span><span class="hex">#E5E5E5</span></div>
    <div class="sw" style="background:#F7F5F2;color:#1A1918;border-color:#e5e5e5"><span>Off White</span><span class="hex">#F7F5F2</span></div>
    <div class="sw" style="background:#FEF3C7;color:#1A1918"><span>Yellow Soft</span><span class="hex">#FEF3C7</span></div>
  </div>
</div>
</body></html>
