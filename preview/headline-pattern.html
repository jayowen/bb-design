<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#1A1918;font-family:var(--font-body); color:#fff;}
  .card{padding:28px;}
  .eyebrow-wrap{display:flex; gap:16px; align-items:center; margin-bottom:16px;}
  .eyebrow-yellow{background:#FACC15; color:#1A1918; font-family:var(--font-display); font-weight:700; font-size:11px; letter-spacing:0.18em; text-transform:uppercase; padding:8px 14px;}
  .eyebrow-dark{background:#1A1918; color:#fff; font-family:var(--font-display); font-weight:700; font-size:11px; letter-spacing:0.18em; text-transform:uppercase; padding:8px 14px; border:1px solid #505050;}
  h2{margin:0 0 8px; font-family:var(--font-display); font-weight:800; font-size:38px; line-height:1.05; letter-spacing:-0.02em; text-transform:uppercase;}
  h2 .hl{color:#FACC15;}
  h2 em{font-style:italic;}
  p.sub{font-family:var(--font-serif); font-style:italic; color:#A3A3A3; font-size:16px; line-height:1.45; margin:0; max-width:48ch;}
</style></head><body>
<div class="card">
  <div class="eyebrow-wrap">
    <span class="eyebrow-yellow">Storybrand Certified</span>
    <span class="eyebrow-dark">How We Help You Grow</span>
  </div>
  <h2>Get a Plan That <span class="hl">Works</span> <em>& a team you can trust</em></h2>
  <p class="sub">The three-beat uppercase headline with one yellow emphasis word, anchored by an italic serif subhead — the Business Builders signature.</p>
</div>
</body></html>
