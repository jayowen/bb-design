<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#fff;font-family:var(--font-body);}
  .card{padding:24px; display:flex; gap:20px; align-items:flex-end;}
  .item{display:flex; flex-direction:column; align-items:center; gap:10px;}
  .box{width:80px; height:80px; background:#FACC15; border:2px solid #1A1918;}
  .lbl{font-family:var(--font-display); font-weight:700; font-size:10px; letter-spacing:0.16em; text-transform:uppercase;}
  .tag{font-family:var(--font-mono); font-size:11px; color:#6B6B6B;}
</style></head><body>
<div class="card">
  <div class="item"><div class="box" style="border-radius:0"></div><span class="lbl">r-0</span><span class="tag">0px</span></div>
  <div class="item"><div class="box" style="border-radius:2px"></div><span class="lbl">r-1</span><span class="tag">2px</span></div>
  <div class="item"><div class="box" style="border-radius:4px"></div><span class="lbl">r-2</span><span class="tag">4px</span></div>
  <div class="item"><div class="box" style="border-radius:8px"></div><span class="lbl">r-3</span><span class="tag">8px</span></div>
  <div class="item"><div class="box" style="border-radius:999px"></div><span class="lbl">r-pill</span><span class="tag">999px · avatars, hero chip</span></div>
</div>
</body></html>
