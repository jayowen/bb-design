<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#fff;font-family:var(--font-body);}
  .card{padding:32px 24px 40px; display:flex; gap:40px; align-items:flex-start;}
  .item{display:flex; flex-direction:column; align-items:center; gap:14px;}
  .swatch{width:110px; height:70px; background:#FACC15; border:2px solid #1A1918;}
  .lbl{font-family:var(--font-display); font-weight:700; font-size:10px; letter-spacing:0.16em; text-transform:uppercase; color:#1A1918;}
  .tag{font-family:var(--font-mono); font-size:11px; color:#6B6B6B;}
  .title{font-family:var(--font-display); font-weight:700; font-size:11px; letter-spacing:0.2em; text-transform:uppercase; color:#6B6B6B; margin:0 0 4px;}
</style></head><body>
<div class="card">
  <div class="item">
    <p class="title">Offset SM</p>
    <div class="swatch" style="box-shadow:4px 4px 0 0 #1A1918"></div>
    <span class="lbl">shadow-offset-sm</span>
    <span class="tag">4px 4px 0 #1A1918</span>
  </div>
  <div class="item">
    <p class="title">Offset</p>
    <div class="swatch" style="box-shadow:6px 6px 0 0 #1A1918"></div>
    <span class="lbl">shadow-offset</span>
    <span class="tag">6px 6px 0 #1A1918</span>
  </div>
  <div class="item">
    <p class="title">Offset LG</p>
    <div class="swatch" style="box-shadow:10px 10px 0 0 #1A1918"></div>
    <span class="lbl">shadow-offset-lg</span>
    <span class="tag">10px 10px 0 #1A1918</span>
  </div>
  <div class="item">
    <p class="title">Soft MD</p>
    <div class="swatch" style="background:#fff;border-color:#E5E5E5;box-shadow:0 4px 8px rgba(26,25,24,.08),0 2px 4px rgba(26,25,24,.06)"></div>
    <span class="lbl">shadow-md</span>
    <span class="tag">soft, interior UI</span>
  </div>
</div>
</body></html>
