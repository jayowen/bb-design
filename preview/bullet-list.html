<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
  html,body{margin:0;background:#fff;font-family:var(--font-body);color:#1A1918;}
  .card{padding:26px;}
  ul{list-style:none; margin:0; padding:0; display:grid; grid-template-columns:1fr 1fr; gap:10px 20px;}
  li{display:flex; align-items:center; gap:10px; font-size:15px; color:#1A1918;}
  li svg{color:#F49E1C; width:18px; height:18px; stroke-width:2.4;}
  .eyebrow{font-family:var(--font-display); font-weight:700; font-size:11px; letter-spacing:0.18em; text-transform:uppercase; color:#6B6B6B; margin:0 0 10px;}
</style></head><body>
<div class="card">
  <p class="eyebrow">Checkmark Bullets · signature list style</p>
  <ul>
    <li><i data-lucide="check-circle-2"></i> Messaging Blueprint</li>
    <li><i data-lucide="check-circle-2"></i> Video Blueprint</li>
    <li><i data-lucide="check-circle-2"></i> Website Blueprint</li>
    <li><i data-lucide="check-circle-2"></i> Marketing Blueprint</li>
    <li><i data-lucide="check-circle-2"></i> AI Blueprint</li>
    <li><i data-lucide="check-circle-2"></i> CRM & HubSpot</li>
  </ul>
</div>
<script>lucide.createIcons();</script>
</body></html>
