<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#fff;font-family:var(--font-body);color:var(--fg);}
  .card{padding:28px; display:grid; grid-template-columns:140px 1fr; row-gap:18px; column-gap:24px; align-items:baseline;}
  .lbl{font-family:var(--font-display); font-weight:700; font-size:10px; letter-spacing:0.2em; text-transform:uppercase; color:#6B6B6B; padding-top:6px;}
  h1,h2,h3,h4{margin:0; font-family:var(--font-display); font-weight:700; text-transform:uppercase; letter-spacing:-0.02em; line-height:1.05;}
  h1{font-size:48px;} h2{font-size:36px;} h3{font-size:26px;} h4{font-size:20px; text-transform:none; letter-spacing:0;}
</style></head><body>
<div class="card">
  <div class="lbl">H1 · 48</div><h1>The Complete Growth Stack</h1>
  <div class="lbl">H2 · 36</div><h2>Who We Work With</h2>
  <div class="lbl">H3 · 26</div><h3>Get a Blueprint</h3>
  <div class="lbl">H4 · 20</div><h4>Managed Hosting & Maintenance</h4>
</div>
</body></html>
