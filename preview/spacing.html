<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#fff;font-family:var(--font-body);}
  .card{padding:24px; display:flex; gap:14px; align-items:flex-end; flex-wrap:wrap;}
  .item{display:flex; flex-direction:column; align-items:center; gap:8px;}
  .box{background:#FACC15; border:1.5px solid #1A1918;}
  .tag{font-family:var(--font-mono); font-size:11px; color:#505050;}
  .name{font-family:var(--font-display); font-weight:700; font-size:10px; letter-spacing:0.15em; text-transform:uppercase; color:#1A1918;}
</style></head><body>
<div class="card">
  <div class="item"><div class="box" style="width:4px;height:4px"></div><span class="name">sp-1</span><span class="tag">4</span></div>
  <div class="item"><div class="box" style="width:8px;height:8px"></div><span class="name">sp-2</span><span class="tag">8</span></div>
  <div class="item"><div class="box" style="width:12px;height:12px"></div><span class="name">sp-3</span><span class="tag">12</span></div>
  <div class="item"><div class="box" style="width:16px;height:16px"></div><span class="name">sp-4</span><span class="tag">16</span></div>
  <div class="item"><div class="box" style="width:24px;height:24px"></div><span class="name">sp-5</span><span class="tag">24</span></div>
  <div class="item"><div class="box" style="width:32px;height:32px"></div><span class="name">sp-6</span><span class="tag">32</span></div>
  <div class="item"><div class="box" style="width:48px;height:48px"></div><span class="name">sp-7</span><span class="tag">48</span></div>
  <div class="item"><div class="box" style="width:64px;height:64px"></div><span class="name">sp-8</span><span class="tag">64</span></div>
  <div class="item"><div class="box" style="width:96px;height:64px"></div><span class="name">sp-9</span><span class="tag">96</span></div>
</div>
</body></html>
