<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#F7F5F2;font-family:var(--font-body);}
  .wrap{padding:30px; display:grid; grid-template-columns:1fr 1fr; gap:28px;}
  /* Stepped card (dark top + white bottom, offset shadow) */
  .step{background:#fff; border:1.5px solid #1A1918; box-shadow:6px 6px 0 0 #1A1918; position:relative;}
  .step .top{background:#1A1918; height:60px; position:relative;}
  .step .num{position:absolute; top:10px; left:10px; width:34px; height:34px; background:#FACC15; color:#1A1918; font-family:var(--font-display); font-weight:800; font-size:14px; display:flex; align-items:center; justify-content:center;}
  .step .body{padding:16px 18px 18px;}
  .step .eyebrow{font-family:var(--font-display); font-weight:700; font-size:10px; letter-spacing:0.18em; text-transform:uppercase; color:#6B6B6B; margin:0 0 4px;}
  .step h3{font-family:var(--font-display); font-weight:800; font-size:20px; text-transform:uppercase; margin:0 0 8px;}
  .step p{font-size:13px; line-height:1.5; color:#505050; margin:0;}
  /* Quote card */
  .quote{background:#1A1918; color:#fff; padding:22px; border:2px solid #FACC15;}
  .quote .q{font-family:var(--font-serif); font-style:italic; font-size:16px; line-height:1.45; margin:0 0 14px;}
  .quote .attr{font-family:var(--font-display); font-weight:700; font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:#FACC15;}
  .quote .sub{font-family:var(--font-body); font-size:12px; color:#A3A3A3; margin-top:2px;}
</style></head><body>
<div class="wrap">
  <div class="step">
    <div class="top"><div class="num">01</div></div>
    <div class="body">
      <p class="eyebrow">Get the right strategy</p>
      <h3>Plan</h3>
      <p>Strategic blueprints that set the foundation for success.</p>
    </div>
  </div>
  <div class="quote">
    <p class="q">"They helped us clarify our message and tripled our qualified leads."</p>
    <div class="attr">— Letti Bozard</div>
    <div class="sub">Bozard Ford Lincoln</div>
  </div>
</div>
</body></html>
