<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Business Builders — Clear message. Proven strategy. Real growth.</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="colors_and_type.css">
<style>
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:var(--font-body);color:var(--fg);background:var(--bg);-webkit-font-smoothing:antialiased;overflow-x:hidden}
  img{max-width:100%;display:block}
  button{font:inherit;cursor:pointer}
  a{color:inherit;text-decoration:none}

  body[data-scheme="midnight"]{--bg:#0B0A09;--bg-alt:#111110;--fg:#F7F5F2;--fg-2:#BFBAB1;--hairline:#262422}
  body[data-scheme="cream"]{--bg:#F4EFE6;--bg-alt:#ECE5D8}

  .wrap{max-width:1280px;margin:0 auto;padding:0 32px}
  .section{padding:112px 0;position:relative}
  .section--dark{background:var(--bb-black);color:var(--bb-white);--fg:var(--bb-white);--fg-2:#BFBAB1}
  .section--cream{background:var(--bb-off-white)}

  /* ------- Sec head ------- */
  .sec-head{text-align:center;max-width:820px;margin:0 auto 64px}
  .eyebrow{display:inline-flex;align-items:center;gap:8px;font-family:var(--font-display);font-weight:700;font-size:12px;letter-spacing:.22em;text-transform:uppercase;padding:8px 14px;background:var(--bb-yellow);color:var(--bb-black);margin-bottom:24px}
  .section--dark .eyebrow{background:transparent;color:var(--bb-yellow);border:1.5px solid var(--bb-yellow)}
  .sec-head h2{font-family:var(--font-display);font-weight:800;font-size:clamp(40px,5vw,64px);line-height:1.02;letter-spacing:-.025em;text-transform:uppercase;margin:0 0 20px}
  .sec-head h2 em{font-style:italic}
  .sec-head h2 .hl{color:var(--bb-yellow)}
  .sec-head .lede{font-family:var(--font-serif);font-style:italic;font-size:22px;line-height:1.45;color:var(--fg-2);margin:0}

  /* ------- Buttons ------- */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:10px;font-family:var(--font-display);font-weight:700;font-size:13px;letter-spacing:.14em;text-transform:uppercase;padding:16px 24px;border:1.5px solid var(--bb-black);transition:transform 160ms,box-shadow 160ms,background 160ms;position:relative}
  .btn-primary{background:var(--bb-yellow);color:var(--bb-black);box-shadow:6px 6px 0 0 var(--bb-black)}
  .btn-primary:hover{background:var(--bb-yellow-deep)}
  .btn-primary:active{transform:translate(4px,4px);box-shadow:2px 2px 0 0 var(--bb-black)}
  .btn-ghost{background:transparent;color:inherit;box-shadow:none}
  .btn-dark{background:var(--bb-black);color:var(--bb-white);box-shadow:6px 6px 0 0 var(--bb-yellow);border-color:var(--bb-black)}
  .btn-dark:hover{transform:translate(2px,2px);box-shadow:4px 4px 0 0 var(--bb-yellow)}
  .btn-outline-y{background:transparent;color:#fff;border:2px solid var(--bb-yellow);box-shadow:none}
  .btn-outline-y:hover{background:var(--bb-yellow);color:var(--bb-black)}
  .btn .ar{transition:transform 160ms}
  .btn:hover .ar{transform:translateX(4px)}

  /* ------- Reveal ------- */
  .rv{opacity:0;transform:translateY(24px);transition:opacity .6s cubic-bezier(.22,1,.36,1),transform .6s cubic-bezier(.22,1,.36,1)}
  .rv.in{opacity:1;transform:none}

  /* ------- Bullets ------- */
  .bl{list-style:none;margin:0;padding:0;display:grid;gap:12px}
  .bl li{display:flex;gap:12px;font-size:15px;line-height:1.5}
  .bl li::before{content:"";width:18px;height:18px;border-radius:999px;background:var(--bb-yellow);flex:0 0 auto;margin-top:3px;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 20 20'><path d='M5 10.5L8.5 14L15 7' fill='none' stroke='%231A1918' stroke-width='2.4' stroke-linecap='round' stroke-linejoin='round'/></svg>");background-repeat:no-repeat;background-position:center}

  /* =========== NAV =========== */
  .nav{position:fixed;top:0;left:0;right:0;z-index:100;transition:all 220ms}
  .nav-inner{display:flex;align-items:center;justify-content:space-between;padding:20px 32px;max-width:1440px;margin:0 auto}
  .nav.scrolled{background:rgba(247,245,242,.95);backdrop-filter:blur(8px);border-bottom:1px solid var(--hairline);box-shadow:0 2px 0 rgba(0,0,0,.03)}
  .nav.scrolled .nav-inner{padding:14px 32px}
  .nav-logo{height:28px}
  .nav-links{display:flex;gap:32px;align-items:center}
  .nav-links a{font-family:var(--font-display);font-weight:600;font-size:13px;letter-spacing:.06em;text-transform:uppercase;color:var(--bb-black);position:relative;padding:4px 0}
  .nav-links a::after{content:"";position:absolute;left:0;right:100%;bottom:-2px;height:2px;background:var(--bb-yellow);transition:right 180ms}
  .nav-links a:hover::after{right:0}
  .nav-cta{display:flex;gap:10px;align-items:center}

  /* =========== HERO =========== */
  .hero{padding:160px 0 100px;position:relative;overflow:hidden}
  .hero-grid{display:grid;grid-template-columns:1.15fr .85fr;gap:64px;align-items:center;min-height:640px}
  .hero-k{display:inline-flex;align-items:center;gap:10px;font-family:var(--font-display);font-weight:700;font-size:12px;letter-spacing:.22em;text-transform:uppercase;padding:10px 16px;background:var(--bb-black);color:var(--bb-yellow);margin-bottom:28px}
  .hero-k .dot{width:6px;height:6px;background:var(--bb-yellow);border-radius:999px}
  .hero h1{font-family:var(--font-display);font-weight:900;font-size:clamp(60px,8vw,132px);line-height:.9;letter-spacing:-.035em;text-transform:uppercase;margin:0 0 32px}
  .hero h1 em{font-style:italic}
  .hero h1 .hl{color:var(--bb-yellow-deep)}
  .hero .sub{font-family:var(--font-serif);font-style:italic;font-size:clamp(20px,1.6vw,26px);line-height:1.4;color:var(--fg-2);max-width:560px;margin:0 0 36px}
  .hero-ctas{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:48px}
  .hero-meta{display:flex;gap:48px;flex-wrap:wrap;padding-top:28px;border-top:1.5px solid var(--hairline)}
  .hero-meta .n{font-family:var(--font-display);font-weight:900;font-size:36px;letter-spacing:-.02em;line-height:1}
  .hero-meta .l{font-family:var(--font-display);font-weight:700;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--fg-2);margin-top:8px}

  .hero-art{position:relative;height:560px}
  .hero-art .tile{position:absolute;background:#fff;border:1.5px solid var(--bb-black);box-shadow:10px 10px 0 0 var(--bb-black)}
  .hero-art .t1{left:0;top:40px;width:340px;height:220px;background:var(--bb-yellow);padding:22px;display:flex;flex-direction:column;justify-content:space-between}
  .hero-art .t1 .lbl{font-family:var(--font-display);font-weight:700;font-size:11px;letter-spacing:.22em;text-transform:uppercase}
  .hero-art .t1 .big{font-family:var(--font-display);font-weight:900;font-size:64px;line-height:.9;letter-spacing:-.03em}
  .hero-art .chart{display:flex;align-items:flex-end;gap:6px;height:60px}
  .hero-art .chart .b{flex:1;background:var(--bb-black)}
  .hero-art .t2{right:0;top:0;width:360px;height:280px;overflow:hidden;box-shadow:10px 10px 0 0 var(--bb-yellow-deep)}
  .hero-art .browser{background:#F4F0EA;height:30px;display:flex;align-items:center;gap:5px;padding:0 12px;border-bottom:1.5px solid var(--bb-black)}
  .hero-art .browser .d{width:8px;height:8px;border-radius:999px;background:#D4D0C8}
  .hero-art .browser .u{flex:1;height:14px;background:#fff;border:1px solid #E5E5E5;margin-left:10px;font-family:var(--font-mono);font-size:9px;padding:1px 8px;color:#7a756d}
  .hero-art .wrap-body{padding:18px;display:flex;flex-direction:column;gap:8px}
  .hero-art .wrap-body .h{height:18px;background:var(--bb-yellow);width:72%}
  .hero-art .wrap-body .l{height:6px;background:#E5E5E5;border-radius:2px}
  .hero-art .wrap-body .l.w1{width:90%}.hero-art .wrap-body .l.w2{width:76%}
  .hero-art .btn-mock{margin-top:8px;align-self:flex-start;background:var(--bb-black);color:#fff;padding:8px 12px;font-family:var(--font-display);font-weight:800;font-size:10px;letter-spacing:.14em;text-transform:uppercase}
  .hero-art .t3{left:60px;bottom:0;width:300px;height:200px;background:var(--bb-black);color:#fff;padding:22px;box-shadow:10px 10px 0 0 var(--bb-yellow)}
  .hero-art .t3 .k{font-family:var(--font-display);font-weight:700;font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--bb-yellow)}
  .hero-art .t3 h4{font-family:var(--font-display);font-weight:800;font-size:22px;letter-spacing:-.01em;text-transform:uppercase;margin:10px 0}
  .hero-art .t3 p{font-size:12px;color:#BFBAB1;margin:0;line-height:1.4}

  /* =========== TRUST =========== */
  .trust{background:var(--bb-off-white);padding:40px 0;border-top:1.5px solid var(--hairline);border-bottom:1.5px solid var(--hairline)}
  .trust-inner{display:grid;grid-template-columns:auto 1fr;gap:40px;align-items:center}
  .trust-lbl{font-family:var(--font-display);font-weight:700;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--fg-2);max-width:170px;line-height:1.4}
  .trust-row{display:flex;gap:56px;flex-wrap:wrap;align-items:center}
  .trust-row .lg{font-family:var(--font-display);font-weight:800;font-size:16px;letter-spacing:-.01em;color:var(--fg-2);display:flex;align-items:center;gap:10px;opacity:.75;transition:all 160ms}
  .trust-row .lg:hover{opacity:1;color:var(--fg)}
  .trust-row .lg .bd{width:24px;height:24px;border:1.5px solid currentColor;display:inline-flex;align-items:center;justify-content:center;font-size:11px}

  /* =========== GROWTH STACK =========== */
  .stack{display:grid;grid-template-columns:repeat(4,1fr);border:1.5px solid var(--bb-black);box-shadow:14px 14px 0 0 var(--bb-yellow);background:#fff}
  .pillar{padding:40px 28px 36px;display:flex;flex-direction:column;gap:18px;border-right:1.5px solid var(--bb-black);transition:background 200ms;position:relative}
  .pillar:last-child{border-right:none}
  .pillar:hover{background:var(--bb-yellow-soft)}
  .pillar .num{font-family:var(--font-display);font-weight:900;font-size:13px;letter-spacing:.2em;color:var(--bb-yellow-deep)}
  .pillar h3{font-family:var(--font-display);font-weight:900;font-size:34px;letter-spacing:-.02em;text-transform:uppercase;margin:0}
  .pillar p{font-size:14px;line-height:1.55;color:var(--fg-2);margin:0}
  .pillar .bl li{font-size:13px;padding-bottom:8px;border-bottom:1px solid var(--hairline)}
  .pillar .bl li:last-child{border-bottom:none;padding-bottom:0}

  /* =========== CASES =========== */
  .cases{display:grid;grid-template-columns:1.1fr .9fr;gap:20px}
  .case{padding:40px;min-height:340px;position:relative;cursor:pointer;overflow:hidden;transition:transform 240ms;border:1.5px solid var(--bb-black)}
  .case:hover{transform:translateY(-4px)}
  .case--dark{background:var(--bb-black);color:#fff}
  .case--yellow{background:var(--bb-yellow);color:var(--bb-black)}
  .case--cream{background:var(--bb-off-white);color:var(--bb-black)}
  .case--big{grid-column:1;grid-row:1 / span 2;min-height:700px;padding:56px}
  .case .tg{font-family:var(--font-display);font-weight:700;font-size:10px;letter-spacing:.22em;text-transform:uppercase;display:inline-block;padding:6px 10px;background:var(--bb-yellow);color:var(--bb-black);margin-bottom:20px}
  .case--yellow .tg,.case--cream .tg{background:var(--bb-black);color:var(--bb-yellow)}
  .case h4{font-family:var(--font-display);font-weight:800;font-size:26px;line-height:1.1;letter-spacing:-.02em;text-transform:uppercase;margin:0 0 12px}
  .case--big h4{font-size:44px;margin-bottom:20px}
  .case p{margin:0;font-size:14px;line-height:1.5;opacity:.85;max-width:42ch}
  .case .mtr{font-family:var(--font-display);font-weight:900;font-size:72px;line-height:.95;letter-spacing:-.04em;margin:28px 0 4px}
  .case--big .mtr{font-size:136px}
  .case .mlb{font-family:var(--font-display);font-weight:700;font-size:11px;letter-spacing:.22em;text-transform:uppercase}
  .case .ar{position:absolute;right:24px;bottom:24px;width:52px;height:52px;border-radius:999px;border:2px solid currentColor;display:inline-flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:800;font-size:18px;transition:all 180ms}
  .case:hover .ar{background:var(--bb-yellow);color:var(--bb-black);border-color:var(--bb-yellow)}

  /* Modal */
  .backdrop{position:fixed;inset:0;background:rgba(10,9,8,.75);z-index:200;display:flex;align-items:center;justify-content:center;padding:40px;opacity:0;pointer-events:none;transition:opacity .2s}
  .backdrop.on{opacity:1;pointer-events:auto}
  .modal{background:#fff;max-width:880px;width:100%;max-height:90vh;overflow:auto;border:1.5px solid var(--bb-black);box-shadow:16px 16px 0 0 var(--bb-yellow);transform:translateY(20px) scale(.98);transition:transform .3s cubic-bezier(.22,1,.36,1);position:relative}
  .backdrop.on .modal{transform:none}
  .modal-hd{padding:40px 48px 28px;border-bottom:1.5px solid var(--hairline)}
  .modal-hd h3{font-family:var(--font-display);font-weight:900;font-size:44px;line-height:1;letter-spacing:-.02em;text-transform:uppercase;margin:0}
  .modal-bd{padding:28px 48px 48px;display:grid;gap:28px;font-size:15px;line-height:1.6;color:#3a3a3a}
  .modal-mtr{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;padding:28px;background:var(--bb-off-white);border:1.5px solid var(--bb-black)}
  .modal-mtr .n{font-family:var(--font-display);font-weight:900;font-size:42px;letter-spacing:-.02em;line-height:1}
  .modal-mtr .l{font-family:var(--font-display);font-weight:700;font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--fg-2);margin-top:6px}
  .modal-x{position:absolute;top:16px;right:16px;width:40px;height:40px;background:var(--bb-black);color:#fff;border:none;font-size:20px;font-family:var(--font-display);font-weight:800}

  /* =========== INDUSTRIES =========== */
  .industries{display:grid;grid-template-columns:repeat(5,1fr);gap:14px}
  .ind{background:#fff;border:1.5px solid var(--bb-black);padding:24px 18px;display:flex;flex-direction:column;gap:12px;align-items:flex-start;transition:all 200ms;cursor:pointer}
  .ind:hover{background:var(--bb-yellow);transform:translateY(-2px)}
  .ind .ib{width:44px;height:44px;background:var(--bb-yellow);border:1.5px solid var(--bb-black);display:inline-flex;align-items:center;justify-content:center;color:var(--bb-black)}
  .ind:hover .ib{background:var(--bb-black);color:var(--bb-yellow)}
  .ind .ib svg{width:22px;height:22px}
  .ind h5{font-family:var(--font-display);font-weight:800;font-size:14px;letter-spacing:-.01em;text-transform:uppercase;margin:0}

  /* =========== PROCESS =========== */
  .proc{display:grid;grid-template-columns:repeat(5,1fr);gap:0;position:relative;counter-reset:st}
  .proc::before{content:"";position:absolute;top:40px;left:8%;right:8%;height:2px;background:var(--bb-yellow);z-index:0}
  .stp{display:flex;flex-direction:column;align-items:center;gap:14px;padding:0 16px;position:relative;z-index:1;text-align:center}
  .stp .n{width:80px;height:80px;background:var(--bb-yellow);border:2px solid var(--bb-black);font-family:var(--font-display);font-weight:900;font-size:28px;display:inline-flex;align-items:center;justify-content:center;color:var(--bb-black);box-shadow:6px 6px 0 0 var(--bb-black)}
  .stp h5{font-family:var(--font-display);font-weight:800;font-size:17px;text-transform:uppercase;letter-spacing:-.01em;margin:0}
  .stp p{font-size:13px;line-height:1.5;color:var(--fg-2);margin:0}

  /* =========== TESTIMONIALS =========== */
  .tslider{position:relative;overflow:hidden}
  .ttrack{display:flex;transition:transform .48s cubic-bezier(.22,1,.36,1)}
  .tslide{min-width:100%;display:grid;grid-template-columns:.7fr 1fr;gap:56px;padding:8px;align-items:center}
  .tph{aspect-ratio:4/5;border:1.5px solid var(--bb-black);box-shadow:14px 14px 0 0 var(--bb-yellow);position:relative;overflow:hidden;background:linear-gradient(135deg,#E8DFD0,#C7BBA7)}
  .tph .ini{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:900;font-size:160px;color:rgba(26,25,24,.18);letter-spacing:-.05em}
  .tph::after{content:"";position:absolute;inset:0;background:radial-gradient(circle at 50% 40%,rgba(26,25,24,.12),transparent 55%)}
  .tb .mk{font-family:var(--font-serif);font-style:italic;font-size:160px;line-height:.4;color:var(--bb-yellow);display:block;margin-bottom:16px}
  .tq{font-family:var(--font-serif);font-style:italic;font-weight:400;font-size:clamp(22px,2.3vw,34px);line-height:1.3;margin:0 0 28px;color:var(--fg)}
  .tat{display:flex;align-items:center;gap:16px;padding-top:22px;border-top:1.5px solid var(--hairline)}
  .tat .nm{font-family:var(--font-display);font-weight:700;font-size:14px;text-transform:uppercase;letter-spacing:-.01em}
  .tat .rl{font-size:12px;color:var(--fg-2);margin-top:2px}
  .tctrl{display:flex;align-items:center;gap:12px;margin-top:36px}
  .tar{width:48px;height:48px;background:var(--bb-black);color:#fff;border:none;font-family:var(--font-display);font-weight:800;font-size:18px;transition:all 160ms}
  .tar:hover{background:var(--bb-yellow);color:var(--bb-black)}
  .tar:disabled{opacity:.3;cursor:not-allowed}
  .tdots{display:flex;gap:6px;margin-left:6px}
  .td{width:10px;height:10px;background:var(--hairline);border:none;cursor:pointer;transition:all .2s;padding:0}
  .td.on{background:var(--bb-yellow);width:30px}

  /* =========== PRICING =========== */
  .pricing{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
  .tier{padding:36px 32px;display:flex;flex-direction:column;gap:22px;border:1.5px solid var(--bb-black);background:#fff;position:relative;transition:all 200ms}
  .tier:hover{transform:translateY(-4px);box-shadow:8px 8px 0 0 var(--bb-black)}
  .tier--pro{background:var(--bb-black);color:#fff;transform:translateY(-20px);box-shadow:8px 8px 0 0 var(--bb-yellow)}
  .tier--pro:hover{transform:translateY(-24px);box-shadow:12px 12px 0 0 var(--bb-yellow)}
  .tier .rb{position:absolute;top:-14px;right:24px;background:var(--bb-yellow);color:var(--bb-black);padding:6px 14px;font-family:var(--font-display);font-weight:700;font-size:11px;letter-spacing:.22em;text-transform:uppercase;border:1.5px solid var(--bb-black)}
  .tier h4{font-family:var(--font-display);font-weight:900;font-size:26px;letter-spacing:-.02em;text-transform:uppercase;margin:0}
  .tier .td{font-family:var(--font-serif);font-style:italic;font-size:15px;color:var(--fg-2);line-height:1.45;margin:0;width:auto;height:auto;background:none}
  .tier--pro .td{color:#BFBAB1}
  .tier .pr{font-family:var(--font-display);font-weight:900;font-size:52px;letter-spacing:-.03em;line-height:1}
  .tier .pr .per{font-size:13px;font-weight:600;color:var(--fg-2);margin-left:8px;letter-spacing:.02em}
  .tier--pro .pr .per{color:#BFBAB1}
  .tier .sp{height:1.5px;background:var(--hairline)}
  .tier--pro .sp{background:#2A2826}
  .tier--pro .bl li{color:#fff}

  /* =========== BLOG =========== */
  .blog{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
  .post{display:flex;flex-direction:column;gap:16px;transition:transform 200ms;cursor:pointer}
  .post:hover{transform:translateY(-4px)}
  .post .cv{aspect-ratio:4/3;border:1.5px solid var(--bb-black);position:relative;overflow:hidden}
  .post .cv.c1{background:linear-gradient(135deg,#FACC15,#F49E1C)}
  .post .cv.c2{background:var(--bb-black);color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:900;font-size:96px;letter-spacing:-.04em;color:var(--bb-yellow)}
  .post .cv.c3{background:linear-gradient(135deg,#1A1918,#505050)}
  .post .cat{position:absolute;top:14px;left:14px;background:var(--bb-yellow);color:var(--bb-black);padding:6px 10px;font-family:var(--font-display);font-weight:700;font-size:10px;letter-spacing:.22em;text-transform:uppercase}
  .post h5{font-family:var(--font-display);font-weight:800;font-size:20px;line-height:1.2;letter-spacing:-.01em;text-transform:uppercase;margin:0}
  .post .mt{font-family:var(--font-display);font-weight:600;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--fg-2)}

  /* =========== CTA BAND =========== */
  .ctaband{background:var(--bb-yellow);padding:100px 0;color:var(--bb-black);position:relative;overflow:hidden;border-top:1.5px solid var(--bb-black);border-bottom:1.5px solid var(--bb-black)}
  .ctaband-in{display:grid;grid-template-columns:1.2fr .8fr;gap:56px;align-items:center}
  .ctaband h2{font-family:var(--font-display);font-weight:900;font-size:clamp(48px,6vw,84px);line-height:.95;letter-spacing:-.03em;text-transform:uppercase;margin:0 0 16px}
  .ctaband h2 em{font-style:italic}

/* ============ Reveal ============ */
function Reveal({ children, delay = 0, as = 'div', className = '', ...props }) {
  const ref = useRef(null);
  const [seen, setSeen] = useState(false);
  useEffect(() => {
    if (!ref.current) return;
    // If already in viewport at mount, reveal immediately (IO can miss this in Babel-in-browser)
    const r = ref.current.getBoundingClientRect();
    if (r.top < window.innerHeight && r.bottom > 0) {
      setTimeout(() => setSeen(true), delay);
      return;
    }
    const io = new IntersectionObserver(es => {
      es.forEach(e => { if (e.isIntersecting) { setTimeout(() => setSeen(true), delay); io.disconnect(); } });
    }, { threshold: 0.12, rootMargin: '0px 0px -60px 0px' });
    io.observe(ref.current);
    // Safety fallback
    const t = setTimeout(() => setSeen(true), 1200 + delay);
    return () => { io.disconnect(); clearTimeout(t); };
  }, [delay]);
  const C = as;
  return <C ref={ref} className={`rv ${seen ? 'in' : ''} ${className}`} {...props}>{children}</C>;
}

/* ============ App ============ */
function App() {
  const d = window.TWEAKS || {};
  const [scheme, setScheme] = useState(d.scheme || 'classic');
  const [heroVariant, setHeroVariant] = useState(d.heroVariant || 'slash');
  const [tweaksOn, setTweaksOn] = useState(false);

  useEffect(() => { document.body.setAttribute('data-scheme', scheme); }, [scheme]);

  useEffect(() => {
    const onMsg = (e) => {
      if (!e.data || typeof e.data !== 'object') return;
      if (e.data.type === '__activate_edit_mode') setTweaksOn(true);
      if (e.data.type === '__deactivate_edit_mode') setTweaksOn(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  useEffect(() => {
    const edits = { scheme, heroVariant };
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, [scheme, heroVariant]);

  return (
    <>
      <Nav />
      <Hero variant={heroVariant} />
      <Trust />
      <Stack />
      <Cases />
      <Industries />
      <Process />
      <Testimonials />
      <Pricing />
      <Blog />
      <CTAForm />
      <Footer />
      <Tweaks scheme={scheme} setScheme={setScheme} heroVariant={heroVariant} setHeroVariant={setHeroVariant} visible={tweaksOn} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
